<form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

  <div class="form-group">
    <label for="requesterName">Nombre del Solicitante</label>
    <input
      id="requesterName"
      type="text"
      formControlName="requesterName"
      placeholder="Ingrese el nombre del solicitante"
    />
    <span
      class="field-error"
      *ngIf="form.get('requesterName')?.invalid && form.get('requesterName')?.touched"
    >
      <span *ngIf="form.get('requesterName')?.errors?.['required']">El nombre es requerido.</span>
      <span *ngIf="form.get('requesterName')?.errors?.['maxlength']">El nombre no puede superar 100 caracteres.</span>
    </span>
  </div>

  <div class="form-group">
    <label for="amount">Monto</label>
    <input
      id="amount"
      type="number"
      formControlName="amount"
      placeholder="0.00"
      min="0.01"
      step="0.01"
    />
    <span
      class="field-error"
      *ngIf="form.get('amount')?.invalid && form.get('amount')?.touched"
    >
      <span *ngIf="form.get('amount')?.errors?.['required']">El monto es requerido.</span>
      <span *ngIf="form.get('amount')?.errors?.['min']">El monto debe ser mayor a 0.</span>
    </span>
  </div>

  <div class="form-group">
    <label for="currency">Moneda</label>
    <select id="currency" formControlName="currency">
      <option value="" disabled selected>Seleccione una moneda</option>
      <option value="MXN">MXN</option>
      <option value="USD">USD</option>
    </select>
    <span
      class="field-error"
      *ngIf="form.get('currency')?.invalid && form.get('currency')?.touched"
    >
      <span *ngIf="form.get('currency')?.errors?.['required']">La moneda es requerida.</span>
    </span>
  </div>

  <div class="form-group">
    <label for="description">Descripcion</label>
    <textarea
      id="description"
      formControlName="description"
      placeholder="Descripcion opcional de la solicitud"
      rows="3"
    ></textarea>
  </div>

  <div class="success-banner" *ngIf="successMessage">
    {{ successMessage }}
  </div>

  <div class="error-banner" *ngIf="errorMessage">
    {{ errorMessage }}
  </div>

  <div class="form-actions">
    <button type="submit" [disabled]="isLoading">
      <span *ngIf="!isLoading">Crear Solicitud</span>
      <span *ngIf="isLoading">Enviando...</span>
    </button>
  </div>

</form>
